# nginx 설정 파일 (Windows 로컬 환경)
# Express API 서버와 연동하여 클라이언트 + API 서빙

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    client_max_body_size 100m;

    # ========================================
    # gzip 압축
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # ========================================
    # 요청 제한 설정
    # ========================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=400r/m;
    limit_req_zone $binary_remote_addr zone=login:10m   rate=30r/m;

    # rate limit 초과 시 503 대신 올바른 429 반환
    limit_req_status 429;

    # ========================================
    # CORS Origin 안전 처리
    # ========================================
    map $http_origin $cors_origin {
        default  '';
        ~^https?://.+  $http_origin;
    }

    # 메인 서버 블록
    server {
        listen       80;
        server_name  localhost;

        # ========================================
        # IP 제한 설정
        # ========================================
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        # ========================================
        # CORS 에러 응답 처리
        # ========================================
        error_page 429 @cors_429;
        location @cors_429 {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Vary'                             'Origin'     always;
            return 429 '{"success":false,"message":"요청이 너무 많습니다. 잠시 후 다시 시도해주세요."}';
        }

        error_page 503 @cors_503;
        location @cors_503 {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Vary'                             'Origin'     always;
            return 503 '{"success":false,"message":"서버가 일시적으로 과부하 상태입니다. 잠시 후 다시 시도해주세요."}';
        }

        # ========================================
        # 업로드 파일 처리 (404 버그 해결 - root 방식 적용)
        # ========================================

        # 이미지/아바타: 브라우저 인라인 표시 허용
        location ~ ^/uploads/(images|avatars)/ {
            # ⭐ TODO: 실제 서버 프로젝트가 위치한 윈도우 절대경로로 수정하세요 (uploads 폴더의 상위 폴더)
            root C:/myproject/server;
            
            expires 1y;
            add_header Cache-Control        "public, immutable";
            add_header Content-Disposition  "inline";
            add_header X-Content-Type-Options "nosniff";
        }

        # 일반 파일: 다운로드 강제
        location /uploads/ {
            # ⭐ TODO: 실제 서버 프로젝트가 위치한 윈도우 절대경로로 수정하세요 (uploads 폴더의 상위 폴더)
            root C:/myproject/server;
            
            expires 1y;
            add_header Cache-Control          "public, immutable";
            add_header Content-Disposition    "attachment";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Download-Options     "noopen";
            try_files $uri =404;
        }

        # ========================================
        # 로그인 API — 엄격한 rate limit (Docker name -> 127.0.0.1)
        # ========================================
        location = /api/auth/login {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=login burst=3 nodelay;

            proxy_pass http://127.0.0.1:4000/api/auth/login;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 토큰 갱신 API (Docker name -> 127.0.0.1)
        # ========================================
        location = /api/auth/refresh {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=api burst=10 nodelay;

            proxy_pass http://127.0.0.1:4000/api/auth/refresh;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 관리자 API (Docker name -> 127.0.0.1)
        # ========================================
        location /api/admin/ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=api burst=15 nodelay;

            proxy_pass http://127.0.0.1:4000/api/admin/;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 일반 API 프록시 (Docker name -> 127.0.0.1)
        # ========================================
        location /api/ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=api burst=30 nodelay;

            proxy_pass http://127.0.0.1:4000/api/;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 클라이언트 정적 파일 (폰트/CSS/JS 캐싱)
        # ========================================
        location ~* ^(?!/uploads/).*\.(css|js|woff|woff2|ttf|eot)$ {
            # ⭐ TODO: 실제 React 빌드 결과물이 위치한 윈도우 절대경로로 수정하세요
            root   C:/myproject/client/dist;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # ========================================
        # React SPA
        # ========================================
        location / {
            limit_req zone=general burst=20 nodelay;
            
            # ⭐ TODO: 실제 React 빌드 결과물이 위치한 윈도우 절대경로로 수정하세요
            root   C:/myproject/client/dist;
            
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # ========================================
        # 에러 페이지
        # ========================================
        error_page 500 501 502 504 /50x.html;
        location = /50x.html {
            # ⭐ TODO: 실제 React 빌드 결과물이 위치한 윈도우 절대경로로 수정하세요
            root C:/myproject/client/dist;
            internal;
        }

        error_page 400 401 402 403 404 /index.html;

    } # server 블록 종료
} # http 블록 종료
